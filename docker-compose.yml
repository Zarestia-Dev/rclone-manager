x-common: &common
  image: ghcr.io/zarestia-dev/rclone-manager:latest
  restart: unless-stopped
  networks:
    - rclone-network
  environment: &common-env
    PUID: ${PUID:-1000}
    PGID: ${PGID:-1000}
    RUST_LOG: ${RUST_LOG:-info}
    RCLONE_MANAGER_DATA_DIR: /data
    RCLONE_MANAGER_CACHE_DIR: /data/cache
    RCLONE_MANAGER_LOG_DIR: /data/logs
    RCLONE_MANAGER_SECRET: ${RCLONE_MANAGER_SECRET:-}
    RCLONE_MANAGER_SECRET_PATH: ${RCLONE_MANAGER_SECRET_PATH:-}
    RCLONE_MANAGER_SECRET_FILE: ${RCLONE_MANAGER_SECRET_FILE:-}

services:
  rclone-manager:
    <<: *common
    container_name: rclone-manager
    ports:
      - "${RCLONE_MANAGER_PORT:-8080}:8080"
      - "53682:53682"
    volumes:
      - rclone-data:/data
      - rclone-config:/config
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - ""

  rclone-manager-auth:
    <<: *common
    container_name: rclone-manager-auth
    ports:
      - "${RCLONE_MANAGER_PORT:-8080}:8080"
      - "53682:53682"
    volumes:
      - rclone-data:/data
      - rclone-config:/config
    environment:
      <<: *common-env
      RCLONE_MANAGER_USER: ${RCLONE_MANAGER_USER:-admin}
      RCLONE_MANAGER_PASS: ${RCLONE_MANAGER_PASS:?Set RCLONE_MANAGER_PASS in .env}
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-sf",
          "-u",
          "${RCLONE_MANAGER_USER:-admin}:${RCLONE_MANAGER_PASS}",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - auth

  rclone-manager-tls:
    <<: *common
    container_name: rclone-manager-tls
    ports:
      - "${RCLONE_MANAGER_PORT:-8443}:8443"
      - "53682:53682"
    volumes:
      - rclone-data:/data
      - rclone-config:/config
      - ./certs:/app/certs:ro
    environment:
      <<: *common-env
      RCLONE_MANAGER_PORT: "8443"
      RCLONE_MANAGER_TLS_CERT: /app/certs/cert.pem
      RCLONE_MANAGER_TLS_KEY: /app/certs/key.pem
    healthcheck:
      test: ["CMD", "curl", "-sfk", "https://localhost:8443/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - tls

  rclone-manager-auth-tls:
    <<: *common
    container_name: rclone-manager-auth-tls
    ports:
      - "${RCLONE_MANAGER_PORT:-8443}:8443"
      - "53682:53682"
    volumes:
      - rclone-data:/data
      - rclone-config:/config
      - ./certs:/app/certs:ro
    environment:
      <<: *common-env
      RCLONE_MANAGER_USER: ${RCLONE_MANAGER_USER:-admin}
      RCLONE_MANAGER_PASS: ${RCLONE_MANAGER_PASS:?Set RCLONE_MANAGER_PASS in .env}
      RCLONE_MANAGER_PORT: "8443"
      RCLONE_MANAGER_TLS_CERT: /app/certs/cert.pem
      RCLONE_MANAGER_TLS_KEY: /app/certs/key.pem
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-sfk",
          "-u",
          "${RCLONE_MANAGER_USER:-admin}:${RCLONE_MANAGER_PASS}",
          "https://localhost:8443/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - auth-tls

  rclone-manager-host:
    <<: *common
    container_name: rclone-manager-host
    ports:
      - "${RCLONE_MANAGER_PORT:-8080}:8080"
      - "53682:53682"
    volumes:
      - /home/hakan/.local/share/com.rclone.manager:/data
      - /home/hakan/.config/rclone:/config
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - host-test

volumes:
  rclone-data:
    name: rclone-manager-data
  rclone-config:
    name: rclone-manager-config

networks:
  rclone-network:
    driver: bridge
