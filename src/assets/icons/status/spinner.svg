<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* 1. Outer ethereal track */
    .rc-ring-outer {
      transform-origin: 12px 12px;
      animation: rc-spin-right 8s linear infinite;
      stroke: var(--rc-spinner-track, currentColor); 
    }
    
    /* 2. Inner mechanical track */
    .rc-ring-inner {
      transform-origin: 12px 12px;
      animation: rc-spin-left 4s linear infinite;
      stroke: var(--rc-spinner-inner, currentColor);
    }
    
    /* 3. The main energy ring */
    .rc-ring-main {
      transform-origin: 12px 12px;
      animation: rc-spin-right 1.4s linear infinite, rc-draw-arc 1.4s ease-in-out infinite;
      stroke-linecap: round;
      stroke: var(--rc-spinner-main, currentColor);
    }

    /* 4. The satellite orb */
    .rc-satellite {
      transform-origin: 12px 12px;
      animation: rc-spin-right 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      fill: var(--rc-spinner-main, currentColor);
    }

    /* 5. The data core */
    .rc-core-data {
      transform-origin: 12px 12px;
      animation: rc-pulse-data 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
      fill: var(--rc-spinner-inner, currentColor);
    }

    /* --- Keyframes --- */
    @keyframes rc-spin-right { 100% { transform: rotate(360deg); } }
    @keyframes rc-spin-left { 100% { transform: rotate(-360deg); } }
    
    @keyframes rc-draw-arc {
      0% { stroke-dasharray: 1px, 51px; stroke-dashoffset: 0; }
      50% { stroke-dasharray: 38px, 51px; stroke-dashoffset: -12px; }
      100% { stroke-dasharray: 38px, 51px; stroke-dashoffset: -51px; }
    }

    @keyframes rc-pulse-data {
      0% { transform: scale(0.6) rotate(0deg); opacity: 0.5; }
      100% { transform: scale(1.1) rotate(90deg); opacity: 1; }
    }

    /* --- Accessibility: Reduced Motion --- */
    @media (prefers-reduced-motion: reduce) {
      .rc-ring-outer, .rc-ring-inner, .rc-ring-main, .rc-satellite, .rc-core-data {
        animation: none;
      }
      .rc-ring-main {
        stroke-dasharray: 38px, 51px;
        animation: rc-gentle-pulse 2s ease-in-out infinite;
      }
      .rc-core-data {
        animation: rc-gentle-pulse 2s ease-in-out infinite;
        animation-delay: 1s;
      }
    }
    
    @keyframes rc-gentle-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>

  <circle class="rc-ring-outer" cx="12" cy="12" r="10" stroke-width="0.75" stroke-dasharray="1 4" opacity="0.4" />
  <circle class="rc-ring-inner" cx="12" cy="12" r="5" stroke-width="1" stroke-dasharray="3.925 3.925" opacity="0.3" />
  <circle class="rc-ring-main" cx="12" cy="12" r="8" stroke-width="2" fill="none" />
  <g class="rc-satellite"><circle cx="12" cy="4" r="2" /></g>
  <path class="rc-core-data" d="M12 9 L14.5 12 L12 15 L9.5 12 Z" />
</svg>
