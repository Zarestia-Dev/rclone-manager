<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><style>@keyframes rc-spin-right{to{transform:rotate(360deg)}}@keyframes rc-spin-left{to{transform:rotate(-360deg)}}@keyframes rc-draw-arc{0%{stroke-dasharray:1px,51px;stroke-dashoffset:0}50%{stroke-dasharray:38px,51px;stroke-dashoffset:-12px}to{stroke-dasharray:38px,51px;stroke-dashoffset:-51px}}@keyframes rc-pulse-data{0%{transform:scale(.6) rotate(0deg);opacity:.5}to{transform:scale(1.1) rotate(90deg);opacity:1}}@keyframes rc-gentle-pulse{0%,to{opacity:.3}50%{opacity:1}}</style><circle cx="12" cy="12" r="10" stroke-dasharray="1 4" stroke-width=".75" opacity=".4" style="transform-origin:12px 12px;animation:rc-spin-right 8s linear infinite;stroke:var(--rc-spinner-track, currentColor)"/><circle cx="12" cy="12" r="5" stroke-dasharray="3.925 3.925" opacity=".3" style="transform-origin:12px 12px;animation:rc-spin-left 4s linear infinite;stroke:var(--rc-spinner-inner, currentColor)"/><circle cx="12" cy="12" r="8" stroke-width="2" style="transform-origin:12px 12px;animation:rc-spin-right 1.4s linear infinite,rc-draw-arc 1.4s ease-in-out infinite;stroke-linecap:round;stroke:var(--rc-spinner-main, currentColor)"/><circle cx="12" cy="4" r="2" style="transform-origin:12px 12px;animation:rc-spin-right 1.8s cubic-bezier(.4,0,.2,1) infinite;fill:var(--rc-spinner-main, currentColor)"/><path d="m12 9 2.5 3-2.5 3-2.5-3Z" style="transform-origin:12px 12px;animation:rc-pulse-data 2.5s cubic-bezier(.4,0,.2,1) infinite alternate;fill:var(--rc-spinner-inner, currentColor)"/></svg>