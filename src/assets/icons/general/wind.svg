<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <style>
    .rc-spinner-wave {
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 12 40;
      animation: rc-flow 1.35s linear infinite;
    }
    .rc-spinner-wave:nth-of-type(1) { stroke: var(--rc-spinner-main, currentColor); }
    .rc-spinner-wave:nth-of-type(2) { stroke: var(--rc-spinner-inner, currentColor); opacity: .75; animation-delay: -.45s; }
    .rc-spinner-wave:nth-of-type(3) { stroke: var(--rc-spinner-track, currentColor); opacity: .45; animation-delay: -.9s; }
    
    @keyframes rc-flow {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -52; }
    }
    @media (prefers-reduced-motion: reduce) {
      .rc-spinner-wave { animation: none; stroke-dasharray: none; opacity: 1; }
    }
  </style>
  <path class="rc-spinner-wave" d="M3 12C6 8 10 8 13 12C16 16 20 16 21 12"/>
  <path class="rc-spinner-wave" d="M3 15C6 11 10 11 13 15C16 19 20 19 21 15"/>
  <path class="rc-spinner-wave" d="M3 9C6 5 10 5 13 9C16 13 20 13 21 9"/>
</svg>