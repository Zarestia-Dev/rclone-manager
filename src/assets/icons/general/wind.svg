<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><style>@keyframes rc-flow{0%{stroke-dashoffset:0}to{stroke-dashoffset:-52}}.rc-spinner-wave{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:12 40;animation:rc-flow 1.35s linear infinite}.rc-spinner-wave.wave-1{stroke:var(--rc-spinner-main, currentColor)}.rc-spinner-wave.wave-2{stroke:var(--rc-spinner-inner, currentColor);opacity:.75;animation-delay:-.45s}.rc-spinner-wave.wave-3{stroke:var(--rc-spinner-track, currentColor);opacity:.45;animation-delay:-.9s}@media (prefers-reduced-motion:reduce){.rc-spinner-wave{animation:none;stroke-dasharray:none;opacity:1}}</style><path d="M3 12c3-4 7-4 10 0s7 4 8 0" class="rc-spinner-wave wave-1"/><path d="M3 15c3-4 7-4 10 0s7 4 8 0" class="rc-spinner-wave wave-2"/><path d="M3 9c3-4 7-4 10 0s7 4 8 0" class="rc-spinner-wave wave-3"/></svg>