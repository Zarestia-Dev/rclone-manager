<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>RClone Manager — Offline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fafafb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#222226" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <style>
      :root {
        --bg: #fafafb;
        --fg: #000006;
        --card-bg: #ffffff;
        --border: rgba(0, 0, 0, 0.1);
        --dim: #939090;
        --accent: #2ec27e;
        --shadow: rgba(0, 0, 0, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #222226;
          --fg: #ffffff;
          --card-bg: #2a2a2e;
          --border: rgba(255, 255, 255, 0.1);
          --dim: #9a9996;
          --accent: #57e389;
          --shadow: rgba(0, 0, 0, 0.3);
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        text-align: center;
        max-width: 480px;
        width: 100%;
      }

      .logo {
        width: 96px;
        height: 96px;
        margin-bottom: 32px;
        opacity: 0.85;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 40px 32px;
        box-shadow: 0 4px 24px var(--shadow);
      }

      .status-icon {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: color-mix(in srgb, var(--accent) 15%, transparent);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }

      .status-icon svg {
        width: 24px;
        height: 24px;
        color: var(--accent);
      }

      h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
        letter-spacing: -0.02em;
      }

      p {
        font-size: 14px;
        color: var(--dim);
        line-height: 1.6;
        margin-bottom: 24px;
      }

      .retry-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 24px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        outline: none;
      }

      .retry-btn:hover {
        transform: translateY(-1px);
      }

      .retry-btn:active {
        transform: translateY(0);
      }

      .retry-btn svg {
        transition: transform 0.3s ease;
      }

      .retry-btn:hover svg {
        transform: rotate(180deg);
      }

      .hint {
        margin-top: 24px;
        font-size: 12px;
        color: var(--dim);
        opacity: 0.7;
      }

      .hint code {
        background: var(--border);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- App Logo -->
      <svg
        width="512"
        height="512"
        viewBox="0 0 512 512"
        fill="none"
        class="logo"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M256 500C388.548 500 496 394.339 496 264C496 133.661 388.548 28 256 28C123.452 28 16 133.661 16 264C16 394.339 123.452 500 256 500Z"
          fill="url(#paint0_linear_371_1232)"
        />
        <path

        <path
          d="M228.897 342.211L220.301 327.359C214.703 330.718 208.178 332.685 201.175 332.685C180.584 332.685 163.894 315.995 163.894 295.404C163.894 274.817 180.584 258.127 201.175 258.127L235.707 258.103L249.66 233.945L235.707 209.787L201.171 209.819C153.902 209.819 115.585 248.139 115.585 295.404C115.585 342.673 153.902 380.993 201.171 380.993C218.872 380.993 235.314 375.616 248.962 366.414C241.153 359.716 234.326 351.614 228.897 342.211Z"

          <linearGradient

            <stop offset="1" stop-color="#E4EFF8" />
          </linearGradient>
          <linearGradient
            id="paint1_linear_371_1232"
            x1="255.759"
            y1="11.9993"
            x2="255.759"
            y2="480.226"
            gradientUnits="userSpaceOnUse"
          >
            <stop stop-color="white" />
            <stop offset="1" stop-color="#DBDBDB" />
          </linearGradient>
        </defs>
      </svg>

      <div class="card">
        <!-- Disconnected icon -->
        <div class="status-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="24px"
            viewBox="0 -960 960 960"
            width="24px"
            fill="currentColor"
          >
            <path
              d="M762-84 414-434q-31 7-59.5 19T301-386q-21 14-46.5 14.5T212-389q-18-18-16.5-43.5T217-473q23-17 48.5-31t52.5-26l-90-90q-26 14-50.5 29.5T130-557q-20 16-45.5 16T42-559q-18-18-17-43t21-41q22-18 45-34.5t49-30.5l-56-56q-11-11-11-28t11-28q11-11 28-11t28 11l679 679q12 12 12 28.5T819-84q-12 11-28.5 11.5T762-84Zm-353-65.5Q380-179 380-220q0-42 29-71t71-29q42 0 71 29t29 71q0 41-29 70.5T480-120q-42 0-71-29.5ZM753-395q-16 16-37.5 15.5T678-396l-10-10-10-10-96-96q-13-13-5-27t28-9q45 11 85.5 31t75.5 47q18 14 20.5 36.5T753-395Zm165-164q-17 18-42 18.5T831-556q-72-59-161.5-91.5T480-680q-21 0-40.5 1.5T400-674q-25 4-45-10.5T331-724q-4-25 11-45t40-24q24-4 48.5-5.5T480-800q125 0 235.5 41.5T914-644q20 17 21 42t-17 43Z"
            />
          </svg>
        </div>

        <h1 id="title">Cannot Connect to Server</h1>
        <p id="message">
          The RClone Manager server is unreachable. Please check that the service is running and try
          again.
        </p>

        <button class="retry-btn" onclick="location.reload()">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="28px"
            viewBox="0 -960 960 960"
            width="28px"
            fill="currentColor"
          >
            <path
              d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-70q0-17 11.5-28.5T760-800q17 0 28.5 11.5T800-760v200q0 17-11.5 28.5T760-520H560q-17 0-28.5-11.5T520-560q0-17 11.5-28.5T560-600h128q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q68 0 124.5-34.5T692-367q8-14 22.5-19.5t29.5-.5q16 5 23 21t-1 30q-41 80-117 128t-169 48Z"
            />
          </svg>
          <span id="retry-text">Retry Connection</span>
        </button>
      </div>

      <p class="hint" id="hint"></p>
    </div>

    <script>
      // Localized messages using browser language
      const translations = {
        en: {
          title: 'Cannot Connect to Server',
          message:
            'The RClone Manager server is unreachable. Please check that the service is running and try again.',
          retry: 'Retry Connection',
          hint: 'Make sure the headless service is running',
        },
        tr: {
          title: 'Sunucuya Bağlanılamıyor',
          message:
            'RClone Manager sunucusuna ulaşılamıyor. Lütfen servisin çalıştığından emin olun ve tekrar deneyin.',
          retry: 'Yeniden Dene',
          hint: 'Headless servisinin çalıştığından emin olun',
        },
        es: {
          title: 'No se puede conectar al servidor',
          message:
            'El servidor de RClone Manager no está disponible. Verifique que el servicio esté en ejecución e intente nuevamente.',
          retry: 'Reintentar conexión',
          hint: 'Asegúrese de que el servicio headless esté en ejecución',
        },
        zh: {
          title: '无法连接到服务器',
          message: 'RClone Manager 服务器无法访问。请检查服务是否正在运行，然后重试。',
          retry: '重试连接',
          hint: '请确保 headless 服务正在运行',
        },
      };

      // Detect browser language and apply translations
      const lang = navigator.language?.split('-')[0] || 'en';
      const t = translations[lang] || translations.en;

      document.getElementById('title').textContent = t.title;
      document.getElementById('message').textContent = t.message;
      document.getElementById('retry-text').textContent = t.retry;
      document.getElementById('hint').textContent = t.hint;
      document.documentElement.lang = lang;
    </script>
  </body>
</html>
