<section class="remotes-panel" [ngClass]="panelClass()" [attr.aria-label]="title()">
  <!-- Panel Header -->
  <div class="panel-header">
    <div class="panel-title">
      <mat-icon [svgIcon]="icon()" [ngClass]="iconClass()" aria-hidden="true"></mat-icon>
      <span class="title-text">{{ title() }}</span>
    </div>
    <span class="panel-count" aria-label="{{ count() }} remotes">{{ count() }}</span>
  </div>

  <!-- Remotes Grid -->
  <div class="remotes-grid-wrap">
    <div class="remotes-grid">
      @for (remote of remotes(); track remote.name) {
        <app-remote-card
          [remote]="remote"
          [mode]="mode()"
          [displayMode]="displayMode()"
          [actionState]="getActionState(remote.name)"
          [actionStates]="getActionStates(remote.name)"
          [primaryActionLabel]="primaryActionLabel()"
          [activeIcon]="activeIcon()"
          [primaryActions]="remote.primaryActions || []"
          (remoteClick)="remoteSelected.emit($event)"
          (openInFiles)="openInFiles.emit($event)"
          (startJob)="startJob.emit($event)"
          (stopJob)="stopJob.emit($event)"
        ></app-remote-card>
      }
    </div>
  </div>
</section>
