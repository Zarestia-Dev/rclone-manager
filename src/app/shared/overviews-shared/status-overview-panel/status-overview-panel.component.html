<div class="status-panel">
  <div class="panel-title-row">
    <div class="title-left">
      <mat-icon [svgIcon]="summaryIcon" class="mode-icon" aria-hidden="true"></mat-icon>
      <span class="panel-title">{{ title() | translate }}</span>
    </div>
    <span class="total-badge">{{ totalCount() }}</span>
  </div>

  <div class="progress-track" aria-hidden="true">
    <div class="progress-fill active-fill" [style.width.%]="activePercentage()"></div>
    <div class="progress-fill inactive-fill" [style.width.%]="inactivePercentage()"></div>
  </div>

  @if (hasData()) {
    <div class="legend">
      @if (activeCount() > 0) {
        <div class="legend-item">
          <span class="legend-dot active" aria-hidden="true"></span>
          <span class="legend-label">{{ activeLabel() | translate }}</span>
          <span class="legend-value">{{ activeCount() }}</span>
        </div>
      }
      @if (inactiveCount() > 0) {
        <div class="legend-item">
          <span class="legend-dot inactive" aria-hidden="true"></span>
          <span class="legend-label">{{ inactiveLabel() | translate }}</span>
          <span class="legend-value">{{ inactiveCount() }}</span>
        </div>
      }
    </div>
  }
</div>
