<mat-card class="remote-card" [ngClass]="remoteCardClasses()" (click)="onRemoteClick()">
  <mat-card-header class="remote-header">
    <div class="remote-info">
      <div class="icon-container">
        <mat-icon
          [svgIcon]="iconService.getIconName(remote().type)"
          class="remote-type-icon"
        ></mat-icon>
      </div>
      <div class="remote-details">
        <h4 class="remote-name" [matTooltip]="remote().name" matTooltipShowDelay="500">
          {{ remote().name }}
        </h4>
        <span class="remote-type">{{ remote().type | titlecase }}</span>
      </div>
    </div>

    <!-- Status indicators showing actual remote states -->
    <div class="remote-status-indicators" aria-hidden="true">
      @if (remote().status.mount.active) {
        <div
          class="status-badge mounted"
          [matTooltip]="getProfileTooltip('mount')"
          matTooltipShowDelay="500"
        >
          <mat-icon
            svgIcon="mount"
            [attr.aria-label]="'detailShared.status.mounted' | translate"
          ></mat-icon>
        </div>
      }
      @if (remote().status.sync.active) {
        <div
          class="status-badge syncing"
          [matTooltip]="getProfileTooltip('sync')"
          matTooltipShowDelay="500"
        >
          <mat-icon
            svgIcon="refresh"
            [attr.aria-label]="'detailShared.status.syncing' | translate"
          ></mat-icon>
        </div>
      }
      @if (remote().status.copy.active) {
        <div
          class="status-badge copying"
          [matTooltip]="getProfileTooltip('copy')"
          matTooltipShowDelay="500"
        >
          <mat-icon
            svgIcon="copy"
            [attr.aria-label]="'detailShared.status.copying' | translate"
          ></mat-icon>
        </div>
      }
      @if (remote().status.move.active) {
        <div
          class="status-badge moving"
          [matTooltip]="getProfileTooltip('move')"
          matTooltipShowDelay="500"
        >
          <mat-icon
            svgIcon="move"
            [attr.aria-label]="'detailShared.status.moving' | translate"
          ></mat-icon>
        </div>
      }
      @if (remote().status.bisync.active) {
        <div
          class="status-badge bisyncing"
          [matTooltip]="getProfileTooltip('bisync')"
          matTooltipShowDelay="500"
        >
          <mat-icon
            svgIcon="right-left"
            [attr.aria-label]="'detailShared.status.bisyncing' | translate"
          ></mat-icon>
        </div>
      }
      @if (remote().status.serve.active) {
        <div
          class="status-badge serving"
          [matTooltip]="getProfileTooltip('serve')"
          matTooltipShowDelay="500"
        >
          <mat-icon
            svgIcon="satellite-dish"
            [attr.aria-label]="'detailShared.status.serving' | translate"
          ></mat-icon>
        </div>
      }
    </div>
  </mat-card-header>

  <mat-card-content class="remote-content">
    <app-quick-action-buttons
      [buttons]="actionButtons()"
      (buttonClick)="onActionButtonClick($event)"
    >
    </app-quick-action-buttons>
  </mat-card-content>
</mat-card>
