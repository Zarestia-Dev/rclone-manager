<header class="overview-header" role="banner">
  <div class="header-content">
    <button
      class="title-section interactive"
      (click)="openBackendModal.emit()"
      [matTooltip]="'shared.overviewHeader.manageBackends' | translate"
      [matTooltipShowDelay]="500"
      matTooltipPosition="left"
      [attr.aria-label]="'shared.overviewHeader.backendSwitchAria' | translate: { title: title() }"
    >
      <div class="logo-container">
        @if (mode() === 'general') {
          <img src="assets/rclone-manager.svg" alt="Rclone Logo" class="app-icon" />
        } @else {
          <mat-icon [svgIcon]="mode()" class="app-icon" aria-hidden="true" />
        }
        <span class="status-dot" [class]="backendStatusClass()"></span>
      </div>

      <div class="text-container">
        <h2>{{ title() | translate }}</h2>
        <span class="backend-name">{{ activeBackend() }}</span>
      </div>
    </button>
  </div>
</header>
