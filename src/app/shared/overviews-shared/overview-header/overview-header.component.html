<header class="overview-header" role="banner">
  <button
    class="header-btn"
    (click)="openBackendModal.emit()"
    [matTooltip]="'shared.overviewHeader.manageBackends' | translate"
    [matTooltipShowDelay]="500"
    matTooltipPosition="left"
    [attr.aria-label]="'shared.overviewHeader.backendSwitchAria' | translate: { title: title() }"
  >
    <!-- Mode icon or app logo -->
    <div class="logo-wrap">
      @if (mode() === 'general') {
        <img src="assets/rclone-manager-2.svg" alt="RClone Manager" class="app-logo" />
      } @else {
        <mat-icon [svgIcon]="mode()" class="mode-logo" aria-hidden="true"></mat-icon>
      }
      <span class="status-dot" [class]="backendStatusClass()" aria-hidden="true"></span>
    </div>

    <!-- Title + backend name -->
    <div class="header-text">
      <h2 class="header-title">{{ title() | translate }}</h2>
      <span class="backend-label">{{ activeBackend() }}</span>
    </div>
  </button>
</header>
