<div class="confirm-modal">
  <div class="modal-content">
    <!-- Contextual Icon -->
    <div class="modal-icon" [class]="getModalColor()">
      <mat-icon [svgIcon]="getModalIcon()" [class]="getModalColor()" aria-hidden="true"></mat-icon>
    </div>
    <h2 class="modal-title">{{ data.title }}</h2>
    <p class="modal-message">{{ data.message }}</p>
  </div>

  <div class="modal-actions">
    @if (data.cancelText) {
      <button
        mat-flat-button
        class="cancel-btn"
        (click)="onCancel()"
        [attr.aria-label]="data.cancelText || 'common.cancel' | translate"
      >
        {{ data.cancelText || 'common.cancel' | translate }}
      </button>
    }

    @if (data.confirmText) {
      <button
        mat-flat-button
        class="confirm-btn"
        [class.warn]="getModalColor() === 'warn'"
        [class.accent]="getModalColor() === 'accent'"
        [class.primary]="getModalColor() === 'primary'"
        (click)="onConfirm()"
        [attr.aria-label]="data.confirmText || 'common.ok' | translate"
      >
        {{ data.confirmText || 'common.ok' | translate }}
      </button>
    }
  </div>
</div>
