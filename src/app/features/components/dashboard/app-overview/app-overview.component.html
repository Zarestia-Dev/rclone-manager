<app-overview-header [mode]="mode()" (openBackendModal)="openBackendModal.emit()" />

<div class="overview-content">
  <!-- Status Summary -->
  <app-status-overview-panel
    [mode]="mode()"
    [totalCount]="remoteFacade.activeRemotes().length"
    [activeCount]="activeCount()"
    [inactiveCount]="inactiveCount()"
  />

  @if (isEditingLayout()) {
    <app-remotes-panel
      [title]="'generalOverview.layout.edit' | translate"
      [icon]="'pen'"
      [isActive]="true"
      [remotes]="remoteFacade.allRemotesForEditor()"
      [allRemotes]="remoteFacade.allRemotesForEditor()"
      [hiddenRemoteNames]="remoteFacade.hiddenRemoteNames()"
      [isEditingLayout]="true"
      [mode]="mode()"
      [displayMode]="cardDisplayMode()"
      [primaryActionLabel]="primaryActionLabel() | translate"
      [activeIcon]="activeIcon()"
      (layoutChanged)="onLayoutChanged($event)"
      (toggleHidden)="onToggleHidden($event)"
    />
  } @else {
    <!-- Active Remotes Panel -->
    @if (activeCount() > 0) {
      <app-remotes-panel
        [title]="activeTitle() | translate"
        [icon]="activeIcon()"
        [isActive]="true"
        [remotes]="activeRemotes()"
        [hiddenRemoteNames]="remoteFacade.hiddenRemoteNames()"
        [isEditingLayout]="false"
        [mode]="mode()"
        [displayMode]="cardDisplayMode()"
        [primaryActionLabel]="primaryActionLabel() | translate"
        [activeIcon]="activeIcon()"
        (remoteSelected)="selectRemote($event)"
        (openInFiles)="triggerOpenInFiles($event)"
        (startJob)="
          startJob.emit({
            type: $event.type,
            remoteName: $event.remoteName,
            profileName: $event.profileName,
          })
        "
        (stopJob)="stopJob.emit($event)"
      />
    }

    <!-- Inactive Remotes Panel -->
    @if (inactiveCount() > 0) {
      <app-remotes-panel
        [title]="inactiveTitle() | translate"
        [icon]="'circle-xmark'"
        [isActive]="false"
        [remotes]="inactiveRemotes()"
        [hiddenRemoteNames]="remoteFacade.hiddenRemoteNames()"
        [isEditingLayout]="false"
        [mode]="mode()"
        [displayMode]="cardDisplayMode()"
        [primaryActionLabel]="primaryActionLabel() | translate"
        [activeIcon]="activeIcon()"
        (remoteSelected)="selectRemote($event)"
        (openInFiles)="triggerOpenInFiles($event)"
        (startJob)="
          startJob.emit({
            type: $event.type,
            remoteName: $event.remoteName,
            profileName: $event.profileName,
          })
        "
        (stopJob)="stopJob.emit($event)"
      />
    }
  }
</div>

<div class="layout-actions-blossom" [class.open]="isBlossomOpen()">
  <div class="blossom-panel">
    <!-- Card Display Mode -->
    <button
      matMiniFab
      class="blossom-item accent"
      [style.transition-delay]="'70ms'"
      (click)="onCardDisplayModeToggle()"
      [matTooltip]="
        cardDisplayMode() === 'compact'
          ? ('generalOverview.layout.showDetailed' | translate)
          : ('generalOverview.layout.showCompact' | translate)
      "
      matTooltipPosition="left"
      matTooltipShowDelay="500"
    >
      <mat-icon [svgIcon]="cardDisplayMode() === 'compact' ? 'detailed' : 'compress'"></mat-icon>
    </button>

    <!-- Edit Layout Toggle -->
    <button
      matMiniFab
      class="blossom-item"
      [style.transition-delay]="'0ms'"
      [class]="isEditingLayout() ? 'primary' : 'accent'"
      (click)="toggleEditLayout()"
      matTooltipShowDelay="500"
      matTooltipPosition="left"
      [matTooltip]="
        isEditingLayout()
          ? ('generalOverview.layout.save' | translate)
          : ('generalOverview.layout.edit' | translate)
      "
    >
      <mat-icon [svgIcon]="isEditingLayout() ? 'check-circle' : 'pen'"></mat-icon>
    </button>
  </div>

  <!-- Main Trigger Button -->
  <button
    matFab
    class="blossom-trigger accent"
    [matTooltip]="'generalOverview.layout.settings' | translate"
    matTooltipPosition="left"
    matTooltipShowDelay="500"
    (click)="toggleBlossom($event)"
  >
    <mat-icon svgIcon="tune"></mat-icon>
  </button>
</div>
