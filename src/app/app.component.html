<div class="app-wrapper" appShortcutHandler>
  @if (!initializing()) {
    @if (nautilusService.isStandaloneWindow()) {
      <app-nautilus></app-nautilus>
    } @else if (!completedOnboarding()) {
      @defer {
        <app-onboarding (completed)="finishOnboarding()"></app-onboarding>
      }
    } @else {
      @defer {
        <app-titlebar data-tauri-drag-region></app-titlebar>
        <app-banner></app-banner>
        <app-home></app-home>
        <app-tabs data-tauri-drag-region></app-tabs>
      }
    }
  }
</div>
