<div class="app-wrapper" appShortcutHandler>
  @if (!initializing()) {
    @if (!completedOnboarding()) {
      @defer {
        <app-onboarding (completed)="finishOnboarding()"></app-onboarding>
      }
    } @else if (modalService.isDialogStandalone()) {
      <ng-container
        *ngComponentOutlet="modalService.dialogComponent(); injector: modalService.dialogInjector"
      ></ng-container>
    } @else if (nautilusService.isStandaloneWindow()) {
      <app-nautilus></app-nautilus>
    } @else {
      @defer {
        <app-titlebar data-tauri-drag-region></app-titlebar>
        <app-banner></app-banner>
        <app-home></app-home>
        <app-tabs data-tauri-drag-region></app-tabs>
      }
    }
  }
</div>
