name: 'Release Android'
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Rust stable and Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi
            x86_64-linux-android
            i686-linux-android

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;26.1.10909125"
          # Write environment variables to GITHUB_ENV so subsequent steps can read them
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Android Debug APK
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
        run: |
          npm run tauri android build -- --debug --features mobile -- --no-default-features

      - name: Upload Debug APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rclone-manager-android-apks
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

      - name: Get Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare Package (Android)
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          # Find all apk files recursively under build/outputs/apk/
          find src-tauri/gen/android/app/build/outputs/apk/ -name "*.apk" | while read -r f; do
              name=$(basename "$f")
              new_name=$(echo "$name" | sed "s/^app-/RClone Manager_${VERSION}_/")
              cp "$f" "$new_name"
              echo "Prepared package: $new_name"
          done

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: 'RClone Manager v${{ steps.get_version.outputs.VERSION }}'
          draft: true
          prerelease: false
          files: |
            RClone Manager_*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
